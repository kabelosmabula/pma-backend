<html>
<body style="margin:0; padding:0; background-color:#f4f4f4; font-family: Arial, sans-serif;">

    <table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 0; background-color:#f4f4f4;">
        <tr>
            <td align="center">

                <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:12px; box-shadow:0 8px 20px rgba(0,0,0,0.08); overflow:hidden;">

                    <!-- Header -->
                    <tr>
                        <td style="background:#1a73e8; padding:25px; text-align:center;">
                            <h2 style="color:#ffffff; margin:0; font-weight:600;">Email Verification</h2>
                        </td>
                    </tr>

                    <!-- Body -->
                    <tr>
                        <td style="padding:40px 40px 30px 40px; text-align:center;">

                            <p style="font-size:16px; color:#555555; line-height:1.6; margin:0 0 25px 0;">
                                Please confirm your email address by clicking the button below.
                            </p>

                            <!-- Button -->
                            <table align="center" cellpadding="0" cellspacing="0">
                                <tr>
                                    <td align="center">
                                        <a href="[URL]"
                                           style="background-color:#1a73e8; color:#ffffff; padding:16px 36px; text-decoration:none; border-radius:8px; display:inline-block; font-size:16px; font-weight:600;">
                                            Verify Email
                                        </a>
                                    </td>
                                </tr>
                            </table>

                            <p style="font-size:14px; color:#777777; margin-top:25px;">
                                This helps us keep your account secure.
                            </p>

                        </td>
                    </tr>

                    <!-- Divider -->
                    <tr>
                        <td style="padding:0 40px;">
                            <hr style="border:none; border-top:1px solid #eeeeee;">
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="padding:20px 40px 35px 40px; text-align:center;">
                            <p style="font-size:12px; color:#999999; margin:0;">
                                If you did not request this verification, you can safely ignore this email.
                            </p>
                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>

</body>
</html>
